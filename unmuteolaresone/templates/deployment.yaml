---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unmute-env
  namespace: "{{ .Release.Namespace }}"
data:
  HF_HOME: "/data/hf-cache"
  KYUTAI_STT_URL: "ws://localhost:8090"
  KYUTAI_TTS_URL: "ws://localhost:8089"
  KYUTAI_LLM_URL: "http://localhost:8080"
  KYUTAI_LLM_MODEL: "gemma-4-e2b"
  MODEL_URL: "https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q8_0.gguf"
  MODEL_FILE: "gemma-4-E2B-it-Q8_0.gguf"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unmute-install-script
  namespace: "{{ .Release.Namespace }}"
data:
  install.sh: |
    #!/bin/bash
    set -e

    MARKER="/data/cargo-cache/.moshi-server-installed"
    BINARY="/data/cargo-cache/bin/moshi-server"

    if [ -f "$BINARY" ]; then
      echo "moshi-server already compiled, skipping build"
      exit 0
    fi

    echo "=== Installing Rust ==="
    curl https://sh.rustup.rs -sSf | sh -s -- -y
    export PATH="/root/.cargo/bin:$PATH"

    echo "=== Installing moshi-server (Rust + CUDA, ~10 min first time) ==="
    CARGO_TARGET_DIR=/data/cargo-cache/target cargo install --features cuda moshi-server@0.6.4 --root /data/cargo-cache

    echo "=== moshi-server installed ==="
    ls -lh "$BINARY"
  stt.toml: |
    static_dir = "/tmp/static"
    log_dir = "/tmp/stt-logs"
    instance_name = "stt"
    authorized_ids = ["public_token"]

    [modules.asr]
    path = "/api/asr-streaming"
    type = "BatchedAsr"
    lm_model_file = "hf://kyutai/stt-1b-en_fr-candle/model.safetensors"
    text_tokenizer_file = "hf://kyutai/stt-1b-en_fr-candle/tokenizer_en_fr_audio_8000.model"
    audio_tokenizer_file = "hf://kyutai/stt-1b-en_fr-candle/mimi-pytorch-e351c8d8@125.safetensors"
    asr_delay_in_tokens = 6
    batch_size = 1
    conditioning_learnt_padding = true
    temperature = 0.25

    [modules.asr.model]
    audio_vocab_size = 2049
    text_in_vocab_size = 8001
    text_out_vocab_size = 8000
    audio_codebooks = 20

    [modules.asr.model.transformer]
    d_model = 2048
    num_heads = 16
    num_layers = 16
    dim_feedforward = 8192
    causal = true
    norm_first = true
    bias_ff = false
    bias_attn = false
    context = 750
    max_period = 100000
    use_conv_block = false
    use_conv_bias = true
    gating = "silu"
    norm = "RmsNorm"
    positional_embedding = "Rope"
    conv_layout = false
    conv_kernel_size = 3
    kv_repeat = 1
    max_seq_len = 40960

    [modules.asr.model.extra_heads]
    num_heads = 4
    dim = 6
  tts.toml: |
    static_dir = "/tmp/static"
    log_dir = "/tmp/tts-logs"
    instance_name = "tts"
    authorized_ids = ["public_token"]

    [modules.tts_py]
    type = "Py"
    path = "/api/tts_streaming"
    text_tokenizer_file = "hf://kyutai/tts-1.6b-en_fr/tokenizer_spm_8k_en_fr_audio.model"
    batch_size = 2
    text_bos_token = 1

    [modules.tts_py.py]
    log_folder = "/tmp/tts-logs"
    voice_folder = "hf-snapshot://kyutai/tts-voices/**/*.safetensors"
    default_voice = "unmute-prod-website/default_voice.wav"
    cfg_coef = 2.0
    cfg_is_no_text = true
    padding_between = 1
    n_q = 24
    padding_bonus = 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: unmuteolaresone
  name: unmuteolaresone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: unmuteolaresone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: unmuteolaresone
    spec:
      initContainers:
        - name: download-llm
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              MODEL_PATH="/data/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already downloaded: $MODEL_PATH"
              else
                mkdir -p /data/models
                echo "Downloading LLM from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                echo "Download complete."
              fi
              ls -lh "$MODEL_PATH"
          envFrom:
            - configMapRef:
                name: unmute-env
          volumeMounts:
            - mountPath: "/data"
              name: data
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
        - name: build-moshi-server
          image: "docker.io/nvidia/cuda:12.8.1-devel-ubuntu22.04"
          command:
            - sh
            - '-c'
            - |
              apt-get update && apt-get install -y curl build-essential libssl-dev pkg-config cmake git wget python3 python3-dev --no-install-recommends && \
              bash /scripts/install.sh
          volumeMounts:
            - mountPath: "/data"
              name: data
            - mountPath: "/scripts/install.sh"
              name: scripts
              subPath: install.sh
          resources:
            limits:
              cpu: "16"
              memory: 16Gi
            requests:
              cpu: 4000m
              memory: 4Gi
      containers:
        - name: unmute-all
          image: "docker.io/nvidia/cuda:12.8.1-runtime-ubuntu22.04"
          command:
            - sh
            - '-c'
            - |
              set -e
              echo "=== Installing Python deps ==="
              apt-get update && apt-get install -y python3 python3-pip wget --no-install-recommends
              pip3 install --quiet moshi unmute uvicorn

              export LD_LIBRARY_PATH=$(python3 -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')
              mkdir -p /tmp/static /tmp/stt-logs /tmp/tts-logs

              echo "=== Downloading llama-server ==="
              if [ ! -f /data/llama-server ]; then
                wget -q -O /tmp/llama-b8720.tar.gz "https://github.com/ggml-org/llama.cpp/releases/download/b8720/llama-b8720-bin-ubuntu-x64-cuda-cu13.1.tar.gz"
                tar xzf /tmp/llama-b8720.tar.gz -C /tmp/
                cp /tmp/build/bin/llama-server /data/llama-server
                chmod +x /data/llama-server
                rm -rf /tmp/llama-b8720.tar.gz /tmp/build
              fi

              echo "=== Starting 4 services ==="

              # LLM (background)
              /data/llama-server \
                --host 0.0.0.0 --port 8080 \
                --model /data/models/${MODEL_FILE} \
                --alias gemma-4-e2b \
                --ctx-size 8192 --n-gpu-layers 99 --threads 16 \
                --cache-type-k q4_0 --cache-type-v q4_0 \
                --batch-size 512 --ubatch-size 512 \
                --parallel 1 --mlock --flash-attn auto --jinja &

              # STT (background)
              /data/cargo-cache/bin/moshi-server worker --config /configs/stt.toml --port 8090 &

              # TTS (background)
              /data/cargo-cache/bin/moshi-server worker --config /configs/tts.toml --port 8089 &

              # Backend (foreground — keeps container alive)
              sleep 5
              exec uvicorn unmute.main_websocket:app --host 0.0.0.0 --port 8000
          envFrom:
            - configMapRef:
                name: unmute-env
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          ports:
            - containerPort: 8000
            - containerPort: 8080
            - containerPort: 8089
            - containerPort: 8090
          volumeMounts:
            - mountPath: "/data"
              name: data
            - mountPath: "/configs/stt.toml"
              name: scripts
              subPath: stt.toml
            - mountPath: "/configs/tts.toml"
              name: scripts
              subPath: tts.toml
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.appData }}/unmute"
            type: DirectoryOrCreate
        - name: scripts
          configMap:
            name: unmute-install-script
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: unmuteolaresone
  name: unmuteolaresone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "backend"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: unmuteolaresone
