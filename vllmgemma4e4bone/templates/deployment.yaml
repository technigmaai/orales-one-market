---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-gemma4e4b-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "google/gemma-4-E4B-it"
  MODEL_ALIAS: "gemma-4-e4b"
  MAX_MODEL_LEN: "8192"
  GPU_MEMORY_UTILIZATION: "0.45"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: vllmgemma4e4bone
  name: vllmgemma4e4bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmgemma4e4bone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmgemma4e4bone
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:gemma4"
          command:
            - "vllm"
            - "serve"
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--limit-mm-per-prompt"
            - "image=1,audio=1"
            - "--dtype"
            - "auto"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models"
            - "--enable-prefix-caching"
          envFrom:
            - configMapRef:
                name: vllm-gemma4e4b-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 60
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 4Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: vllmgemma4e4bone
  name: vllmgemma4e4bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmgemma4e4bone
