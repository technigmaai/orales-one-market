---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-voxtraltts-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "mistralai/Voxtral-4B-TTS-2603"
  MODEL_ALIAS: "voxtral-tts-4b"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: vllmvoxtraltts4bone
  name: vllmvoxtraltts4bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmvoxtraltts4bone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmvoxtraltts4bone
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-omni:v0.18.0"
          command:
            - "vllm-omni"
            - "serve"
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--tokenizer-mode"
            - "mistral"
            - "--omni"
            - "--trust-remote-code"
            - "--enforce-eager"
            - "--download-dir"
            - "/models"
            - "--gpu-memory-utilization"
            - "0.90"
          envFrom:
            - configMapRef:
                name: vllm-voxtraltts-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 40
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 16Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: vllmvoxtraltts4bone
  name: vllmvoxtraltts4bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmvoxtraltts4bone
