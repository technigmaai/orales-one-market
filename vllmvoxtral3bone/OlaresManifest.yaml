      url: https://www.apache.org/licenses/LICENSE-2.0

  limitedCpu: 16
  requiredCpu: 4
  requiredDisk: 20Gi
  limitedDisk: 30Gi
  limitedMemory: 40Gi
  requiredMemory: 4Gi
  requiredGpu: 1Gi
  limitedGpu: 24Gi

  supportArch:
