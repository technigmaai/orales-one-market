apiVersion: 'v2'
metadata:
  name: vllmvoxtral3bone
  icon: https://orales-one-market.aamsellem.workers.dev/icons/vllmvoxtral3bone.png
  description: "Voxtral Mini 3B ASR via vLLM — audio transcription and understanding, optimized for Olares One"
