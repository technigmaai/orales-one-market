---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-cascade2-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/mradermacher/Nemotron-Cascade-2-30B-A3B-i1-GGUF/resolve/main/Nemotron-Cascade-2-30B-A3B.i1-IQ4_XS.gguf"
  MODEL_FILE: "Nemotron-Cascade-2-30B-A3B.i1-IQ4_XS.gguf"
  MODEL_ALIAS: "nemotron-cascade-2-30b-a3b"
  CONTEXT_SIZE: "32768"
  N_GPU_LAYERS: "99"
  THREADS: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: cascade230a3bone
  name: cascade230a3bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cascade230a3bone
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: cascade230a3bone
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already downloaded: $MODEL_PATH"
                ls -lh "$MODEL_PATH"
              else
                echo "Downloading model from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                echo "Download complete."
                ls -lh "$MODEL_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-cascade2-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server-cuda13-b8496"
          command: ["/app/llama-server"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "--n-gpu-layers"
            - "$(N_GPU_LAYERS)"
            - "--threads"
            - "$(THREADS)"
            - "--cache-type-k"
            - "q8_0"
            - "--cache-type-v"
            - "q8_0"
            - "--batch-size"
            - "2048"
            - "--ubatch-size"
            - "1024"
            - "--parallel"
            - "1"
            - "--mlock"
            - "--flash-attn"
            - "auto"
            - "--op-offload"
            - "--jinja"
            - "--special"
            - "--slot-save-path"
            - "/cache"
            - "--no-context-shift"
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          envFrom:
            - configMapRef:
                name: llamacpp-cascade2-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
            - mountPath: "/cache"
              name: cache
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
        - name: cache
          emptyDir: {}
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: cascade230a3bone
  name: cascade230a3bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: cascade230a3bone
status:
  loadBalancer: {}
