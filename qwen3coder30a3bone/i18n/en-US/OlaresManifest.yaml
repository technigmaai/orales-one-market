metadata:
  title: Qwen3 Coder 30B-A3B One
  description: "Qwen3 Coder 30B-A3B via llama.cpp — coding agent optimized for Olares One"

spec:
  fullDescription: |
    Qwen3 Coder 30B-A3B-Instruct (MoE, 3.3B active) served via llama.cpp — coding agent optimized for Olares One.
    RTX 5090M (24GB) + 96GB DDR5 + Core Ultra 9 275HX.
    Unsloth Dynamic Q4_K_XL quantization (16.45GB, important layers upcasted to 8/16-bit).
    KV cache q8_0 — 7GB free VRAM allows high-quality cache with 64K context.
    50.3% SWE-bench Verified. Full tool calling support. 256K native context.
    llama.cpp b8740 with CUDA fused multiply for MoE.
    Downloads the GGUF model on first launch (~16.5GB) and caches it.
    Exposes an OpenAI-compatible API on port 8080.
