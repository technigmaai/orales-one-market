spec:
  versionName: '1.0.5'
  upgradeDescription: |
    v1.0.5: llama.cpp b8667 → b8667 (Hadamard rotation). KV cache q4_0 (with Hadamard rotation) → q4_0 (2x compression). Context 16K → 32K.
  fullDescription: |
    Qwen3.5 35B-A3B Vision (MoE, 3B active) served via llama.cpp — optimized for Olares One.
    Multimodal: accepts images via OpenAI-compatible vision API (image_url format).
    RTX 5090M (24GB) + 96GB DDR5 + Core Ultra 9 275HX.
    Unsloth Dynamic Q4_K_XL quantization (22.2GB) + mmproj F16 (0.9GB).
    Flash attention, CUDA graph optimization, and op-offload enabled.
    llama.cpp b8667 with multimodal projector support.
    Downloads the GGUF model (~22GB) and mmproj (~0.9GB) on first launch.
    Context reduced to 16K to fit model + mmproj in 24GB VRAM.
    Exposes an OpenAI-compatible API on port 8080.

