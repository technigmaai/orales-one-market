---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "Kbenkhaled/Qwen3.5-27B-NVFP4"
  MODEL_ALIAS: "qwen3.5-27b"
  MAX_MODEL_LEN: "16384"
  GPU_MEMORY_UTILIZATION: "0.92"
  MAX_NUM_SEQS: "2"
  MAX_NUM_BATCHED_TOKENS: "4096"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: vllmqwen3527bone
  name: vllmqwen3527bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmqwen3527bone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmqwen3527bone
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:cu130-nightly"
          command:
            - "vllm"
            - "serve"
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs"
            - "$(MAX_NUM_SEQS)"
            - "--max-num-batched-tokens"
            - "$(MAX_NUM_BATCHED_TOKENS)"
            - "--dtype"
            - "auto"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models"
            - "--reasoning-parser"
            - "qwen3"
            - "--enable-prefix-caching"
          envFrom:
            - configMapRef:
                name: vllm-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: vllmqwen3527bone
  name: vllmqwen3527bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmqwen3527bone
