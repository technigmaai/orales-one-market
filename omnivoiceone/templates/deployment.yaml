---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: omnivoiceone
  name: omnivoiceone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: omnivoiceone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: omnivoiceone
    spec:
      containers:
        - name: omnivoice
          image: "docker.io/python:3.12-slim"
          command:
            - sh
            - '-c'
            - |
              pip install --quiet omnivoice fastapi uvicorn python-multipart soundfile numpy

              cat > /app/server.py << 'PYEOF'
              import io
              import os
              import torch
              import soundfile as sf
              import numpy as np
              from fastapi import FastAPI
              from fastapi.responses import Response
              from pydantic import BaseModel
              from typing import Optional

              app = FastAPI(title="OmniVoice TTS")

              model = None

              def get_model():
                  global model
                  if model is None:
                      from omnivoice import OmniVoice
                      device = "cuda" if torch.cuda.is_available() else "cpu"
                      model = OmniVoice.from_pretrained("k2-fsa/OmniVoice", device_map=device)
                  return model

              class SpeechRequest(BaseModel):
                  input: str
                  model: str = "omnivoice"
                  voice: str = "default"
                  response_format: str = "wav"
                  speed: float = 1.0

              @app.get("/health")
              async def health():
                  return {"status": "ok"}

              @app.post("/v1/audio/speech")
              async def speech(req: SpeechRequest):
                  m = get_model()
                  audio = m.generate(text=req.input)
                  buf = io.BytesIO()
                  sf.write(buf, audio, 24000, format="WAV")
                  buf.seek(0)
                  return Response(content=buf.read(), media_type="audio/wav")

              @app.get("/v1/models")
              async def models():
                  return {"data": [{"id": "omnivoice", "object": "model"}]}
              PYEOF

              exec uvicorn server:app --host 0.0.0.0 --port 8000 --app-dir /app
          env:
            - name: HF_HOME
              value: "/data/hf-cache"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 40
          resources:
            limits:
              cpu: "16"
              memory: 16Gi
            requests:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - mountPath: "/data"
              name: data
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: omnivoiceone
  name: omnivoiceone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "omnivoice"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: omnivoiceone
