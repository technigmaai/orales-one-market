---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: qwen3ttstone
  name: qwen3ttstone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: qwen3ttstone
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: qwen3ttstone
    spec:
      initContainers:
        - name: setup
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              chmod -R 777 /workspace/hf
              wget -q -O /tmp/ff.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
              cd /tmp && tar xf ff.tar.xz
              cp /tmp/ffmpeg-*-static/ffmpeg /tmp/ffmpeg-*-static/ffprobe /shared-bin/
              chmod 755 /shared-bin/ffmpeg /shared-bin/ffprobe
              echo "setup complete"
          volumeMounts:
            - mountPath: "/workspace/hf"
              name: hf-cache
            - mountPath: "/shared-bin"
              name: shared-bin
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: qwen3-tts
          image: "ghcr.io/louis-pujol/qwen3-tts:latest"
          command: ["/bin/bash", "-c"]
          args:
            - "export PATH=/shared-bin:$PATH && exec /workspace/venv/bin/python /workspace/start_demo_app.py --base --host 0.0.0.0 --port 8000"
          env:
            - name: HF_HOME
              value: "/workspace/hf"
            - name: TRANSFORMERS_CACHE
              value: "/workspace/hf"
            - name: HF_HUB_CACHE
              value: "/workspace/hf"
          ports:
            - containerPort: 8000
          startupProbe:
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          resources:
            limits:
              cpu: "8"
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - mountPath: "/workspace/hf"
              name: hf-cache
            - mountPath: "/shared-bin"
              name: shared-bin
      volumes:
        - name: shared-bin
          emptyDir: {}
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appData }}/hf-cache"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: qwen3ttstone
  name: qwen3ttstone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "gradio"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: qwen3ttstone
status:
  loadBalancer: {}
