---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-voxtralrt-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "mistralai/Voxtral-Mini-4B-Realtime-2602"
  MODEL_ALIAS: "voxtral-realtime-4b"
  MAX_MODEL_LEN: "65536"
  GPU_MEMORY_UTILIZATION: "0.90"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: vllmvoxtralrt4bone
  name: vllmvoxtralrt4bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllmvoxtralrt4bone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllmvoxtralrt4bone
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:v0.19.0-cu130"
          command:
            - "sh"
            - "-c"
            - |
              pip install --quiet 'mistral-common[soundfile]' soxr librosa soundfile && \
              exec vllm serve "$@"
            - "--"
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--compilation_config"
            - '{"cudagraph_mode": "PIECEWISE"}'
            - "--dtype"
            - "auto"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models"
          envFrom:
            - configMapRef:
                name: vllm-voxtralrt-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: VLLM_DISABLE_COMPILE_CACHE
              value: "1"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 40
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 4Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: vllmvoxtralrt4bone
  name: vllmvoxtralrt4bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllmvoxtralrt4bone
