---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tabbyapi-config
  namespace: "{{ .Release.Namespace }}"
data:
  config.yml: |
    network:
      host: 0.0.0.0
      port: 8080
      disable_auth: true
      api_servers: ["OAI"]

    model:
      model_dir: /models
      model_name: Qwen3.5-35B-A3B-exl3-4.09bpw
      backend: exllamav3
      max_seq_len: 16384
      cache_size: 16384
      cache_mode: FP16
      chunk_size: 2048
      output_chunking: true
      max_batch_size: 1
      vision: false
      reasoning: true
      reasoning_start_token: "<think>"
      reasoning_end_token: "</think>"

    logging:
      log_prompt: false
      log_generation_params: true

    developer:
      unsafe_launch: false
      realtime_process_priority: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: exl3qwen35a3bone
  name: exl3qwen35a3bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: exl3qwen35a3bone
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: exl3qwen35a3bone
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/python:3.12-slim"
          command:
            - sh
            - '-c'
            - |
              MODEL_DIR="/models/Qwen3.5-35B-A3B-exl3-4.09bpw"
              MARKER="$MODEL_DIR/.download_complete"
              if [ -f "$MARKER" ]; then
                echo "Model already downloaded."
                ls -lh "$MODEL_DIR"/*.safetensors
              else
                echo "Installing huggingface_hub..."
                pip install -q huggingface_hub
                echo "Downloading EXL3 4.09bpw model..."
                python3 -c "
              import os
              from huggingface_hub import snapshot_download
              token = os.environ.get('HF_TOKEN') or None
              endpoint = os.environ.get('HF_ENDPOINT') or None
              snapshot_download(
                  repo_id='turboderp/Qwen3.5-35B-A3B-exl3',
                  revision='4.09bpw',
                  local_dir='/models/Qwen3.5-35B-A3B-exl3-4.09bpw',
                  token=token,
                  endpoint=endpoint,
              )
              "
                echo "Download complete."
                touch "$MARKER"
                ls -lh "$MODEL_DIR"/*.safetensors
              fi
          env:
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.HF_TOKEN }}"
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.HF_ENDPOINT }}"
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: tabbyapi
          image: "docker.io/aamsellem/tabbyapi:latest"
          command: ["sh", "-c"]
          args:
            - |
              rm -rf /opt/venv/lib/python3.12/site-packages/infinity_emb
              mkdir -p /opt/venv/lib/python3.12/site-packages/infinity_emb
              echo "EngineArgs = None; AsyncEmbeddingEngine = None" > /opt/venv/lib/python3.12/site-packages/infinity_emb/__init__.py
              exec python3 main.py
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 120
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 180
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
            - mountPath: "/app/config.yml"
              name: config
              subPath: config.yml
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: tabbyapi-config
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: exl3qwen35a3bone
  name: exl3qwen35a3bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "tabbyapi"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: exl3qwen35a3bone
status:
  loadBalancer: {}
